<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="orb" cx="980" cy="120" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d97706" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0v48" stroke="rgba(255,255,255,0.03)" fill="none"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#0a0a09"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#orb)"/>

  <!-- Logo -->
  <text x="80" y="120" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="44" letter-spacing="-2">
    <tspan fill="#d97706">alo</tspan><tspan fill="#fafaf7">dev</tspan>
  </text>

  <!-- Eyebrow -->
  <g transform="translate(80, 220)">
    <rect width="32" height="2" fill="#d97706" y="14"/>
    <text x="48" y="22" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="18" fill="#d97706" letter-spacing="3">STUDIO WEB · APP</text>
  </g>

  <!-- Headline -->
  <g transform="translate(80, 280)">
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="78" fill="#fafaf7" letter-spacing="-3">
      <tspan x="0" y="0">Studio founder-led —</tspan>
      <tspan x="0" y="96">biến ý tưởng thành</tspan>
      <tspan x="0" y="192" fill="#d97706">sản phẩm thật</tspan>
      <tspan fill="#fafaf7">.</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <g transform="translate(80, 600)">
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="20" fill="#a1a1aa">
      11+ sản phẩm vận hành thật · Source code thuộc về bạn
    </text>
  </g>

  <!-- alodev.vn -->
  <text x="1080" y="600" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#d97706" font-weight="600">alodev.vn</text>
</svg>
